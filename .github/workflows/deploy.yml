name: Deploy to VPS

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/deplyx

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # ── Backend image (used by backend, worker, lab-api) ────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.IMAGE_PREFIX }}-backend:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend image ──────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          build-args: |
            VITE_API_URL=/api/v1
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Copy config files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,deploy/vps/nginx.prod.conf,lab/"
          target: /opt/deplyx
          overwrite: true

      - name: Create .env.production on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo '${{ secrets.ENV_PRODUCTION }}' > /opt/deplyx/.env.production

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /opt/deplyx

            echo "── Logging into GitHub Container Registry ──"
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            echo "── Pulling new images ──"
            export IMAGE_TAG="${{ steps.vars.outputs.sha_short }}"
            docker compose -f docker-compose.prod.yml pull backend frontend

            echo "── Recreating app containers (infra untouched) ──"
            IMAGE_TAG="${{ steps.vars.outputs.sha_short }}" \
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d \
              --no-deps --force-recreate \
              backend frontend worker lab-api

            echo "── Waiting for health check ──"
            sleep 15
            for i in 1 2 3 4 5 6; do
              if curl -sf http://localhost/health > /dev/null 2>&1; then
                echo "Backend healthy!"
                break
              fi
              echo "  Attempt $i/6 — waiting 10s…"
              sleep 10
            done

            echo "── Container status ──"
            docker compose -f docker-compose.prod.yml ps --format "table {{.Name}}\t{{.Status}}"

            echo "── Cleaning old images ──"
            docker image prune -f --filter "until=24h" > /dev/null 2>&1 || true

            echo "Deploy complete: ${{ steps.vars.outputs.sha_short }}"
