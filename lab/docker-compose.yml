    container_name: search-obs-01
    hostname: ES-OBS-01
    environment:
      APP_HOSTNAME: "ES-OBS-01"
      SSH_USER: "admin"
      SSH_PASS: "App123!"
      SSH_PORT: "22"
    labels:
      deplyx.lab: "true"
      deplyx.type: "elasticsearch"
      deplyx.category: "Application"
      deplyx.zone: "OBS"
      deplyx.user_name: "search-obs-01"
    networks:
      lab-net:
        ipv4_address: 10.100.0.63
    restart: unless-stopped

  grafana-obs-01:
    build: ./mock-grafana
    container_name: grafana-obs-01
    hostname: MON-OBS-01
    environment:
      APP_HOSTNAME: "MON-OBS-01"
      SSH_USER: "admin"
      SSH_PASS: "App123!"
      SSH_PORT: "22"
    labels:
      deplyx.lab: "true"
      deplyx.type: "grafana"
      deplyx.category: "Application"
      deplyx.zone: "OBS"
      deplyx.user_name: "grafana-obs-01"
    networks:
      lab-net:
        ipv4_address: 10.100.0.64
