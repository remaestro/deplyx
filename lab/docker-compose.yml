  prom-core-01:
    build: ./mock-prometheus
    container_name: prom-core-01
    hostname: PROM-CORE-01
    environment:
      APP_HOSTNAME: "PROM-CORE-01"
      SSH_USER: "admin"
      SSH_PASS: "App123!"
      SSH_PORT: "22"
    labels:
      deplyx.lab: "true"
      deplyx.type: "prometheus"
      deplyx.category: "Application"
      deplyx.zone: "OBS"
      deplyx.user_name: "prom-core-01"
    networks:
      lab-net:
        ipv4_address: 10.100.0.65
    restart: unless-stopped

