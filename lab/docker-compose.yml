      SSH_PASS: "App123!"
      SSH_PORT: "22"
    labels:
      deplyx.lab: "true"
      deplyx.type: "nginx"
      deplyx.category: "Application"
      deplyx.zone: "DMZ"
      deplyx.user_name: "web-gw-01"
    networks:
      lab-net:
        ipv4_address: 10.100.0.60
    restart: unless-stopped

  db-main-01:
    build: ./mock-postgres
    container_name: db-main-01
    hostname: DB-MAIN-01
    environment:
      APP_HOSTNAME: "DB-MAIN-01"
