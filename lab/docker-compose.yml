      deplyx.type: "postgres"
      deplyx.category: "Application"
      deplyx.zone: "DATA"
      deplyx.user_name: "db-main-01"
    networks:
      lab-net:
        ipv4_address: 10.100.0.61
    restart: unless-stopped

  cache-main-01:
