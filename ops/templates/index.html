<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deplyx Ops</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --blue: #58a6ff;
      --purple: #bc8cff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 20px; font-weight: 600; }
    header h1 span { color: var(--blue); }
    .meta { color: var(--muted); font-size: 13px; }
    main { max-width: 1400px; margin: 0 auto; padding: 24px; }

    /* Sections */
    .section { margin-bottom: 24px; }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title .dot { width: 8px; height: 8px; border-radius: 50%; }
    .section-title .dot.ok { background: var(--green); }
    .section-title .dot.warning { background: var(--yellow); }
    .section-title .dot.critical { background: var(--red); }

    /* Grid */
    .grid { display: grid; gap: 12px; }
    .grid-4 { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    .grid-2 { grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .card-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .card-value { font-size: 28px; font-weight: 700; margin: 4px 0; }
    .card-sub { font-size: 12px; color: var(--muted); }

    /* Gauge bar */
    .gauge { height: 6px; background: var(--border); border-radius: 3px; margin-top: 8px; overflow: hidden; }
    .gauge-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
    .gauge-fill.ok { background: var(--green); }
    .gauge-fill.warning { background: var(--yellow); }
    .gauge-fill.critical { background: var(--red); }

    /* Container table */
    .ctable { width: 100%; border-collapse: collapse; }
    .ctable th, .ctable td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .ctable th { color: var(--muted); font-weight: 500; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
    .ctable tr:hover { background: rgba(88, 166, 255, 0.04); }

    /* Status badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-running { background: rgba(63, 185, 80, 0.15); color: var(--green); }
    .badge-exited { background: rgba(248, 81, 73, 0.15); color: var(--red); }
    .badge-healthy { background: rgba(63, 185, 80, 0.15); color: var(--green); }
    .badge-unhealthy { background: rgba(248, 81, 73, 0.15); color: var(--red); }
    .badge-na { background: rgba(139, 148, 158, 0.15); color: var(--muted); }

    /* Health probes */
    .probe {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .probe-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .probe-name { font-weight: 600; font-size: 15px; }
    .probe-status { font-size: 24px; }
    .probe-detail { font-size: 12px; color: var(--muted); }
    .probe-latency { font-size: 13px; font-weight: 600; }
    .probe-latency.fast { color: var(--green); }
    .probe-latency.slow { color: var(--yellow); }
    .probe-latency.down { color: var(--red); }

    /* Logs */
    .log-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .log-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }
    .log-btn:hover, .log-btn.active { border-color: var(--blue); color: var(--blue); }
    .log-box {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.6;
      max-height: 500px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--muted);
    }

    /* Refresh indicator */
    .htmx-request .spinner { display: inline-block; }
    .spinner { display: none; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 768px) {
      main { padding: 16px; }
      .grid-4 { grid-template-columns: 1fr 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
      .ctable { font-size: 11px; }
      .ctable th, .ctable td { padding: 8px 6px; }
    }
  </style>
</head>
<body>
  <header>
    <h1><span>●</span> Deplyx Ops</h1>
    <div class="meta">
      {{ now }} &nbsp;·&nbsp;
      <span class="spinner"></span>
      Auto-refresh 30s
    </div>
  </header>

  <main>
    <!-- System Metrics -->
    <div class="section" id="system-section"
         hx-get="/htmx/system?token={{ token }}"
         hx-trigger="every 30s"
         hx-swap="innerHTML">
      {% include "partials/system.html" %}
    </div>

    <!-- App Health -->
    <div class="section" id="health-section"
         hx-get="/htmx/health?token={{ token }}"
         hx-trigger="every 15s"
         hx-swap="innerHTML">
      {% include "partials/health.html" %}
    </div>

    <!-- Containers -->
    <div class="section" id="containers-section"
         hx-get="/htmx/containers?token={{ token }}"
         hx-trigger="every 30s"
         hx-swap="innerHTML">
      {% include "partials/containers.html" %}
    </div>

    <!-- Logs -->
    <div class="section">
      <div class="section-title">Container Logs</div>
      <div class="log-selector" id="log-buttons">
        {% for c in containers %}
        <button class="log-btn"
                hx-get="/htmx/logs?token={{ token }}&container={{ c.name }}&lines=150"
                hx-target="#log-output"
                hx-swap="innerHTML"
                onclick="document.querySelectorAll('.log-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');">
          {{ c.name }}
        </button>
        {% endfor %}
      </div>
      <div id="log-output" class="log-box">← Select a container to view logs</div>
    </div>
  </main>
</body>
</html>
